# Garuda configuration.
#
# Every key here reaches something. Unknown keys are a startup error rather than
# being silently ignored, so a typo cannot quietly disable what you asked for.

[model]
# Root for the L2 expert cache and the KV spill directory.
path = "./models"
# Path to a GGUF checkpoint. Leave empty to run the synthetic MoE (meaningless
# output). Set it to load a real model instead — the router/experts/top_k knobs are
# then ignored. F32/F16/Q4_0/Q8_0 and the k-quants Q2_K-Q6_K decode; MoE experts may
# be either the merged `..._exps` tensor layout or the older per-expert layout. A
# tiny real model to try:
#   curl -L https://huggingface.co/ggml-org/models/resolve/main/tinyllamas/stories260K.gguf -o stories260K.gguf
# gguf = "stories260K.gguf"
gguf = ""
# Keep the checkpoint packed in a memory-mapped file and dequantise per row at
# inference, instead of expanding every weight to f32 in RAM. Uses roughly the file's
# on-disk size instead of several times more (e.g. ~0.6 GB vs ~4 GB for a 1.1B Q4_K_M
# model), at the cost of slower generation. Only affects gguf models.
mmap = false
# Gating strategy (synthetic MoE only): mixtral | deepseek | qwen
router = "mixtral"
# Context window, in tokens. A byte-level tokenizer means roughly one token per byte.
context = 4096
experts = 8
top_k = 2
# Attention window. 0 attends to the whole context.
sliding_window = 0
# There is no GPU backend. Setting this to true is a startup error, not a fallback.
gpu = false

[memory]
# L1 budget for expert weights. With the current dimensions an expert is ~384 KiB,
# so this holds all eight several times over.
expert_cache = "512MB"
# KV blocks held in RAM per sequence before older ones spill to disk.
kv_resident_blocks = 512
# Prompt prefixes to remember, so a repeated prompt skips prefill.
prompt_cache_entries = 64
# Cold archive tier. Empty disables L3.
archive_path = ""
kv_spill = true

[runtime]
# Compute threads. 0 uses every core.
threads = 0
prefetch = true
predictor = true

[server]
host = "127.0.0.1"
port = 8080
# Sequences decoding at once.
max_concurrent = 4
# Requests allowed to wait for a slot before the server sheds load with a 503.
queue_capacity = 256
# Concurrent requests one caller may have in flight (identified by X-Garuda-User).
max_concurrent_per_user = 8
request_timeout_secs = 120
# Permissive CORS. Off by default: unless api_keys is set below, this server has
# no authentication.
cors = false
# Keys accepted on every request except GET /health and GET /. Checked against
# `Authorization: Bearer <key>` (OpenAI/llama.cpp/Ollama clients) or
# `x-api-key: <key>` (Anthropic clients), whichever a caller sends. Empty (the
# default) means no authentication at all — do not expose this port to a network
# you do not control unless this is set, e.g.:
#   api_keys = ["sk-change-me"]
api_keys = []

[sampling]
temperature = 0.8
top_p = 0.95
top_k = 40
max_tokens = 256
