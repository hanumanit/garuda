<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Garuda</title>
<style>
  :root {
    color-scheme: dark light;
    --bg: #16181d;
    --panel: #1d1f26;
    --sidebar: #191b21;
    --border: #2c2f38;
    --text: #e7e9ee;
    --muted: #8b8f9c;
    --accent: #6ea8fe;
    --user-bubble: #2a3b57;
    --assistant-bubble: #23252c;
    --danger: #e6707c;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --sidebar: #ececef;
      --border: #e1e3e8;
      --text: #1c1e22;
      --muted: #6b6f7a;
      --accent: #2f6fed;
      --user-bubble: #dce8ff;
      --assistant-bubble: #eef0f3;
      --danger: #c8323f;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  #app {
    display: flex;
    height: 100%;
  }

  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 10px;
    overflow-y: auto;
    transition: margin-left 0.15s ease;
  }
  #app.sidebar-collapsed #sidebar { margin-left: -260px; }

  #new-chat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  #new-chat-btn:hover { border-color: var(--accent); }

  #conversations {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
  }
  .conv-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
  }
  .conv-item:hover { background: var(--panel); color: var(--text); }
  .conv-item.active { background: var(--panel); color: var(--text); }
  .conv-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conv-delete {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    visibility: hidden;
  }
  .conv-item:hover .conv-delete { visibility: visible; }
  .conv-delete:hover { color: var(--danger); }
  #conv-empty {
    color: var(--muted);
    font-size: 12px;
    padding: 8px 10px;
  }

  #page {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  #model-badge {
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 10px;
  }
  #notice {
    color: var(--muted);
    font-size: 12px;
    max-width: min(42vw, 420px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #notice.warning { color: var(--danger); }
  header .spacer { flex: 1; }
  header button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  header button:hover { color: var(--text); border-color: var(--accent); }
  #sidebar-toggle { font-size: 14px; padding: 6px 9px; }

  #settings {
    display: none;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    flex-wrap: wrap;
    align-items: center;
  }
  #settings.open { display: flex; }
  #settings label { display: flex; align-items: center; gap: 6px; }
  #settings input[type="range"] { width: 120px; }
  #settings input[type="number"],
  #settings input[type="password"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 3px 6px;
  }
  #settings input[type="number"] { width: 70px; }
  #settings input[type="password"] { width: 160px; }

  main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    justify-content: center;
  }
  #thread {
    width: 100%;
    max-width: 780px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .row.assistant .bubble {
    background: var(--assistant-bubble);
    border-bottom-left-radius: 4px;
  }
  .row.error .bubble {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 1em;
    background: var(--muted);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #empty {
    color: var(--muted);
    text-align: center;
    margin-top: 20vh;
    font-size: 14px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 12px 16px 16px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
  }
  #composer {
    width: 100%;
    max-width: 780px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 14px;
  }
  #composer:focus-within { border-color: var(--accent); }
  #input {
    flex: 1;
    resize: none;
    border: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    max-height: 200px;
    outline: none;
    padding: 6px 0;
  }
  #send, #stop {
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #send { background: var(--accent); color: #0b1220; }
  #send:disabled { opacity: 0.4; cursor: default; }
  #stop { background: var(--danger); color: #1a0d0f; display: none; }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <button id="new-chat-btn" type="button">+ New chat</button>
    <div id="conversations"></div>
  </aside>

  <div id="page">
    <header>
      <button id="sidebar-toggle" type="button" title="Toggle sidebar">☰</button>
      <h1>Garuda</h1>
      <span id="model-badge">…</span>
      <span id="notice" role="status" aria-live="polite"></span>
      <div class="spacer"></div>
      <button id="settings-toggle" type="button">Settings</button>
    </header>

    <div id="settings">
      <label>Temperature
        <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.8">
        <span id="temperature-val">0.80</span>
      </label>
      <label>Max tokens
        <input type="number" id="max-tokens" min="1" max="8192" value="512">
      </label>
      <label>API key
        <input type="password" id="api-key" placeholder="only if the server requires one" autocomplete="off">
      </label>
    </div>

    <main><div id="thread"><div id="empty">Ask garuda anything. Runs entirely on this machine.</div></div></main>

    <footer>
      <div id="composer">
        <textarea id="input" rows="1" placeholder="Message garuda…"></textarea>
        <button id="send" type="button">Send</button>
        <button id="stop" type="button">Stop</button>
      </div>
    </footer>
  </div>
</div>

<script>
(() => {
  const app = document.getElementById('app');
  const sidebarToggle = document.getElementById('sidebar-toggle');
  const newChatBtn = document.getElementById('new-chat-btn');
  const conversationList = document.getElementById('conversations');
  const thread = document.getElementById('thread');
  const empty = document.getElementById('empty');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const stopBtn = document.getElementById('stop');
  const settingsToggle = document.getElementById('settings-toggle');
  const settingsPanel = document.getElementById('settings');
  const temperatureInput = document.getElementById('temperature');
  const temperatureVal = document.getElementById('temperature-val');
  const maxTokensInput = document.getElementById('max-tokens');
  const apiKeyInput = document.getElementById('api-key');
  const modelBadge = document.getElementById('model-badge');
  const notice = document.getElementById('notice');

  // ---- conversations: each { id, title, messages: [{role, content}], updatedAt } ----
  const CONV_STORAGE = 'garuda_conversations';
  const ACTIVE_STORAGE = 'garuda_active_conversation';

  function loadConversations() {
    try {
      const raw = JSON.parse(localStorage.getItem(CONV_STORAGE) ?? '[]');
      return Array.isArray(raw) ? raw : [];
    } catch {
      return [];
    }
  }
  function saveConversations() {
    localStorage.setItem(CONV_STORAGE, JSON.stringify(conversations));
  }
  function titleFor(text) {
    const t = text.trim().replace(/\s+/g, ' ');
    return t.length > 40 ? t.slice(0, 40) + '…' : t;
  }

  let conversations = loadConversations();
  let activeId = localStorage.getItem(ACTIVE_STORAGE);
  if (activeId && !conversations.some((c) => c.id === activeId)) activeId = null;

  /** @type {{role: string, content: string}[]} */
  let history = [];
  const active = conversations.find((c) => c.id === activeId);
  if (active) history = [...active.messages];

  let controller = null;

  // Keep credentials only for this browser tab. Conversations remain in
  // localStorage, but an API key must not be persisted with them.
  const API_KEY_STORAGE = 'garuda_api_key';
  apiKeyInput.value = sessionStorage.getItem(API_KEY_STORAGE) ?? '';
  apiKeyInput.addEventListener('change', () => {
    const key = apiKeyInput.value.trim();
    if (key) sessionStorage.setItem(API_KEY_STORAGE, key);
    else sessionStorage.removeItem(API_KEY_STORAGE);
    refreshModelBadge();
  });

  function authHeaders() {
    const key = apiKeyInput.value.trim();
    return key ? { Authorization: 'Bearer ' + key } : {};
  }

  function setNotice(message = '', warning = false) {
    notice.textContent = message;
    notice.title = message;
    notice.classList.toggle('warning', warning);
  }

  async function responseMessage(res) {
    try {
      const body = await res.json();
      if (body.error?.message) return body.error.message;
    } catch (_) {
      // Non-JSON errors still get a useful status-specific message below.
    }
    return ({
      400: 'The request was rejected by the server.',
      401: 'An API key is required or invalid.',
      429: 'Too many requests. Try again shortly.',
      503: 'The server is busy. Try again shortly.',
      504: 'The request timed out.',
    })[res.status] ?? `Server responded with ${res.status}.`;
  }

  async function refreshModelBadge() {
    try {
      const models = await fetch('/v1/models', { headers: authHeaders() });
      if (models.status === 401) {
        modelBadge.textContent = 'needs API key';
        setNotice('Set a valid API key in Settings to start chatting.', true);
        settingsPanel.classList.add('open');
        return;
      }
      if (!models.ok) throw new Error(await responseMessage(models));
      const model = (await models.json()).data?.[0]?.id ?? 'unknown model';

      const stats = await fetch('/v1/stats', { headers: authHeaders() });
      if (!stats.ok) throw new Error(await responseMessage(stats));
      const kind = (await stats.json()).model?.kind;
      if (kind === 'synthetic') {
        modelBadge.textContent = `${model} · synthetic`;
        setNotice('Synthetic weights: responses have no semantic meaning.', true);
      } else {
        modelBadge.textContent = `${model}${kind === 'gguf' ? ' · GGUF' : ''}`;
        setNotice('');
      }
    } catch (err) {
      modelBadge.textContent = 'unreachable';
      setNotice(err.message || 'Cannot reach the server.', true);
    }
  }
  refreshModelBadge();

  settingsToggle.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  sidebarToggle.addEventListener('click', () => app.classList.toggle('sidebar-collapsed'));
  temperatureInput.addEventListener('input', () => {
    temperatureVal.textContent = Number(temperatureInput.value).toFixed(2);
  });

  function autosize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  }
  input.addEventListener('input', autosize);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);
  stopBtn.addEventListener('click', () => {
    if (!controller) return;
    stopBtn.disabled = true;
    setNotice('Stopping generation…');
    controller.abort();
  });
  newChatBtn.addEventListener('click', newChat);

  function renderThread() {
    thread.innerHTML = '';
    if (history.length === 0) {
      thread.appendChild(empty);
      return;
    }
    for (const m of history) {
      addRow(m.role).textContent = m.content;
    }
  }

  function renderSidebar() {
    conversationList.innerHTML = '';
    if (conversations.length === 0) {
      const p = document.createElement('div');
      p.id = 'conv-empty';
      p.textContent = 'No conversations yet.';
      conversationList.appendChild(p);
      return;
    }
    const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
    for (const c of sorted) {
      const item = document.createElement('div');
      item.className = 'conv-item' + (c.id === activeId ? ' active' : '');
      item.addEventListener('click', () => selectConversation(c.id));

      const title = document.createElement('span');
      title.className = 'conv-title';
      title.textContent = c.title;
      item.appendChild(title);

      const del = document.createElement('button');
      del.className = 'conv-delete';
      del.type = 'button';
      del.textContent = '×';
      del.title = 'Delete';
      del.addEventListener('click', (ev) => {
        ev.stopPropagation();
        deleteConversation(c.id);
      });
      item.appendChild(del);

      conversationList.appendChild(item);
    }
  }

  function setActive(id) {
    activeId = id;
    if (id) localStorage.setItem(ACTIVE_STORAGE, id);
    else localStorage.removeItem(ACTIVE_STORAGE);
  }

  function newChat() {
    if (controller) controller.abort();
    setActive(null);
    history = [];
    renderThread();
    renderSidebar();
    input.value = '';
    autosize();
    input.focus();
  }

  function selectConversation(id) {
    if (id === activeId) return;
    if (controller) controller.abort();
    const c = conversations.find((c) => c.id === id);
    if (!c) return;
    setActive(id);
    history = [...c.messages];
    renderThread();
    renderSidebar();
  }

  function deleteConversation(id) {
    conversations = conversations.filter((c) => c.id !== id);
    saveConversations();
    if (id === activeId) newChat();
    else renderSidebar();
  }

  // Persists `messages` onto conversation `convId` regardless of which
  // conversation is currently active — `send()` captures its own `convId` up
  // front precisely so a mid-stream switch can't leak a reply into the wrong
  // conversation (see `send()`'s comment).
  function persistMessages(convId, messages) {
    const c = conversations.find((c) => c.id === convId);
    if (!c) return;
    c.messages = messages;
    c.updatedAt = Date.now();
    saveConversations();
    if (convId === activeId) renderSidebar();
  }

  function addRow(role) {
    empty.remove();
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    row.appendChild(bubble);
    thread.appendChild(row);
    thread.parentElement.scrollTop = thread.parentElement.scrollHeight;
    return bubble;
  }

  function setBusy(busy) {
    sendBtn.style.display = busy ? 'none' : 'inline-block';
    stopBtn.style.display = busy ? 'inline-block' : 'none';
    input.disabled = busy;
    stopBtn.disabled = false;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || controller) return;

    if (!activeId) {
      const id = crypto.randomUUID();
      conversations.unshift({ id, title: titleFor(text), messages: [], updatedAt: Date.now() });
      setActive(id);
    }

    // Captured once, up front: `activeId`/`history` are shared mutable state
    // that `selectConversation`/`newChat` reassign the moment the user switches
    // away mid-stream. Everything below keys off `convId`/`localHistory`
    // instead, so a switch can never leak this reply into whatever conversation
    // the user switched *to*.
    const convId = activeId;
    let localHistory = [...history, { role: 'user', content: text }];
    history = localHistory;
    addRow('user').textContent = text;
    input.value = '';
    autosize();
    persistMessages(convId, localHistory);

    const bubble = addRow('assistant');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    controller = new AbortController();
    setBusy(true);
    let assistantText = '';

    try {
      const res = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        signal: controller.signal,
        body: JSON.stringify({
          messages: localHistory,
          stream: true,
          temperature: Number(temperatureInput.value),
          max_tokens: Number(maxTokensInput.value),
        }),
      });
      if (res.status === 401) {
        settingsPanel.classList.add('open');
        throw new Error(await responseMessage(res));
      }
      if (!res.ok || !res.body) {
        throw new Error(!res.ok ? await responseMessage(res) : 'The server returned no response stream.');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        let sep;
        while ((sep = buf.indexOf('\n\n')) !== -1) {
          const event = buf.slice(0, sep);
          buf = buf.slice(sep + 2);
          const line = event.split('\n').find(l => l.startsWith('data:'));
          if (!line) continue;
          const data = line.slice(5).trim();
          if (data === '[DONE]') continue;

          const payload = JSON.parse(data);
          if (payload.error) {
            throw new Error(payload.error.message || 'generation error');
          }
          const delta = payload.choices?.[0]?.delta?.content;
          if (delta) {
            assistantText += delta;
            bubble.insertBefore(document.createTextNode(delta), cursor);
            thread.parentElement.scrollTop = thread.parentElement.scrollHeight;
          }
        }
      }
      localHistory = [...localHistory, { role: 'assistant', content: assistantText }];
      if (convId === activeId) history = localHistory;
      persistMessages(convId, localHistory);
    } catch (err) {
      if (err.name !== 'AbortError') {
        const row = bubble.closest('.row');
        row.classList.add('error');
        bubble.textContent = 'Error: ' + err.message;
        setNotice(err.message || 'Generation failed.', true);
      } else {
        setNotice('Generation stopped.');
      }
      if (assistantText) {
        localHistory = [...localHistory, { role: 'assistant', content: assistantText }];
        if (convId === activeId) history = localHistory;
        persistMessages(convId, localHistory);
      }
    } finally {
      cursor.remove();
      controller = null;
      setBusy(false);
      input.focus();
    }
  }

  renderThread();
  renderSidebar();
})();
</script>

</body>
</html>
